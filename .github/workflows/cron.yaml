name: OpenClaw Scheduler
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  trigger-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up and Trigger Bot
        run: |
          curl -X POST https://homemade-openclaw.onrender.com/api/cron \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
